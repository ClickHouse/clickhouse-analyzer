name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check (default features)
        run: cargo check

      - name: Check (LSP features)
        run: cargo check --features lsp

      - name: Check (codegen features)
        run: cargo check --features codegen

      - name: Run tests
        run: cargo test --features lsp

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (LSP)
        run: cargo clippy --features lsp
